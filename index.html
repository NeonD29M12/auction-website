<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <title>เว็บประมูล</title>
  </head>

  <script>
  let seconds = 9000;

  setInterval(function() {
    seconds--;

    let h = Math.floor(seconds / 3600);
    let m = Math.floor((seconds % 3600) / 60);
    let s = seconds % 60;

    document.getElementById("timer").textContent = 
      h + ":" + 
      String(m).padStart(2, "0") + ":" + 
      String(s).padStart(2, "0");
  }, 1000);

  let currentPrice = 15000;

  function playSound() {
  let audio = new AudioContext();
  let osc = audio.createOscillator();
  let gain = audio.createGain();
  osc.connect(gain);
  gain.connect(audio.destination);
  osc.frequency.value = 880;
  gain.gain.setValueAtTime(0.3, audio.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.5);
  osc.start();
  osc.stop(audio.currentTime + 0.5);
}

  function placeBid() {
  let myBid = Number(document.getElementById("bid").value);

  if (myBid > currentPrice) {
    currentPrice = myBid;
    playSound();
    document.getElementById("currentPrice").textContent = "฿" + myBid.toLocaleString();
    let name = document.getElementById("name").value || "ไม่ระบุชื่อ";
    let item = document.createElement("li");
    item.textContent = name + " — ฿" + myBid.toLocaleString();
    document.getElementById("history").prepend(item);
    document.getElementById("message").textContent = 
      "✅ ประมูลสำเร็จ! ราคาใหม่: ฿" + myBid.toLocaleString();
  } else {
    document.getElementById("message").textContent = 
      "❌ ราคาต้องสูงกว่า ฿" + currentPrice.toLocaleString();
  }
}

</script>

  <body>
    <h1>🏆 ประมูลสินค้า</h1>
    <h2>กีตาร์ Gibson Les Paul</h2>
    <p>ราคาปัจจุบัน: <strong id="currentPrice">฿15,000</strong></p>
    <p>เวลาที่เหลือ: <strong id="timer">--:--:--</strong></p>
    
    <input id="name" type="text" placeholder="ใส่ชื่อของคุณ">
    <input id="bid" type="number" placeholder="ใส่ราคาที่อยากประมูล">
    <button onclick="placeBid()">ประมูลเลย</button>
    <p id="message"></p>
    <h3>ประวัติการประมูล</h3>
    <ul id="history"></ul>

  </body>
</html>

<link rel="stylesheet" href="style.css">

<img src="guitar.png" 
     alt="กีตาร์" 
     width="200">
